version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: atm_postgres_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=atm_password_123
      - POSTGRES_DB=atm_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./atm-backend
    container_name: atm_backend_api
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=atm_password_123
      - POSTGRES_DB=atm_db
      - SECRET_KEY=atm_mini_secret_key_12345
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./atm-frontend
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    container_name: atm_frontend_ui
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
